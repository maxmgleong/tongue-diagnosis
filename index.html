<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI 太医 · 智能面诊舌诊</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  :root{--bg:#0a0a0a;--card:#141414;--border:#2a2a2a;--gold:#c9a84c;--text:#e8e0d0;--muted:#7a7060;--green:#4caf50;--orange:#e67e22;--red:#c0392b;--teal:#00897b}
  body{background:var(--bg);color:var(--text);font-family:'Georgia',serif;min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:14px}
  .header{text-align:center;margin-bottom:12px;width:100%;max-width:500px}
  .header-title{font-size:1.8em;color:var(--gold);letter-spacing:0.12em;margin-bottom:2px}
  .header-sub{font-size:0.78em;color:var(--muted)}

  .tabs{display:flex;gap:6px;margin-bottom:12px;width:100%;max-width:500px}
  .tab{flex:1;padding:9px 4px;background:var(--card);border:1px solid var(--border);border-radius:9px;color:var(--muted);font-size:0.82em;cursor:pointer;text-align:center;transition:all 0.2s;font-family:inherit}
  .tab.active{background:#1a1200;border-color:var(--gold);color:var(--gold)}

  .container{width:100%;max-width:500px}
  .tab-content{display:none}
  .tab-content.active{display:block}

  .upload-zone{background:var(--card);border:2px dashed var(--border);border-radius:14px;padding:28px 14px;text-align:center;cursor:pointer;transition:all 0.2s;position:relative}
  .upload-zone:hover{border-color:var(--gold)}
  .upload-icon{font-size:2.2em;margin-bottom:8px}
  .upload-text{font-size:0.9em;color:var(--muted);margin-bottom:4px}
  .upload-hint{font-size:0.7em;color:#444}
  .upload-zone img{max-width:100%;max-height:230px;border-radius:10px;display:block;margin:0 auto}
  .upload-input{display:none}

  .camera-row{display:flex;gap:6px;margin-top:6px}
  .btn-c,.btn-u{flex:1;padding:9px;border:1px solid var(--border);border-radius:8px;font-size:0.82em;cursor:pointer;text-align:center;transition:all 0.15s;background:transparent;font-family:inherit}
  .btn-c{background:#1a1200;color:var(--gold);border-color:#3a2a00}
  .btn-c:hover{background:#2a1a00}
  .btn-u{color:var(--muted)}
  .btn-u:hover{background:var(--card);color:var(--text)}

  .btn-analyze{width:100%;padding:13px;margin-top:8px;background:linear-gradient(135deg,#8b6914,var(--gold),#8b6914);color:#1a1a0a;border:none;border-radius:11px;font-size:0.95em;font-weight:bold;cursor:pointer;transition:all 0.2s;display:none;font-family:inherit;letter-spacing:0.06em}
  .btn-analyze:hover{transform:translateY(-1px);box-shadow:0 5px 16px rgba(201,168,76,0.2)}
  .btn-analyze:disabled{opacity:0.5;cursor:not-allowed;transform:none}

  .progress-wrap{display:none;margin-top:10px}
  .progress-text{text-align:center;font-size:0.8em;color:var(--gold);margin-bottom:5px}
  .progress-bar-bg{height:3px;background:var(--card);border-radius:2px;overflow:hidden}
  .progress-bar-fill{height:100%;background:var(--gold);width:0%;transition:width 0.3s;border-radius:2px}

  .result-card{display:none;background:var(--card);border:1px solid var(--border);border-radius:14px;padding:18px;margin-top:12px;animation:fadeIn 0.4s ease}
  @keyframes fadeIn{from{opacity:0;transform:translateY(6px)};to{opacity:1;transform:translateY(0)}}
  .result-header{text-align:center;border-bottom:1px solid var(--border);padding-bottom:10px;margin-bottom:12px}
  .result-title{font-size:1.05em;color:var(--gold);letter-spacing:0.08em;margin-bottom:2px}
  .result-subtitle{font-size:0.72em;color:var(--muted)}

  .constitution-box{background:#1a1200;border:1px solid #3a2a00;border-radius:10px;padding:12px;text-align:center;margin-bottom:12px}
  .constitution-label{font-size:0.7em;color:var(--muted);letter-spacing:0.08em;margin-bottom:3px}
  .constitution-name{font-size:1.2em;color:var(--gold);margin-bottom:3px}
  .constitution-desc{font-size:0.78em;color:var(--muted);line-height:1.4}

  .indicators{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:12px}
  .indicator{background:#0d0d0d;border-radius:7px;padding:9px;text-align:center}
  .indicator-label{font-size:0.66em;color:var(--muted);margin-bottom:2px}
  .indicator-value{font-size:0.95em;font-weight:bold;margin-bottom:3px}
  .indicator-bar{height:3px;background:#1a1a1a;border-radius:2px;overflow:hidden}
  .indicator-fill{height:100%;border-radius:2px;transition:width 1s}

  .result-section{margin-bottom:10px}
  .section-title{font-size:0.78em;color:var(--gold);letter-spacing:0.06em;margin-bottom:4px;padding-bottom:3px;border-bottom:1px solid #2a2a00}
  .section-content{font-size:0.82em;color:var(--text);line-height:1.55}
  .section-content li{margin-bottom:2px;list-style:none}
  .section-content li::before{content:'· ';color:var(--gold)}

  .tags{display:flex;flex-wrap:wrap;gap:5px;margin-top:5px}
  .tag{background:#1a1200;border:1px solid #3a2a00;color:var(--gold);padding:3px 8px;border-radius:10px;font-size:0.7em;cursor:pointer;transition:all 0.15s}
  .tag:hover,.tag.active{background:#2a1a00;border-color:var(--gold)}

  /* Face section specific */
  .face-zone-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px}
  .face-zone{background:#0d0d0d;border:1px solid #222;border-radius:8px;padding:8px;text-align:center}
  .face-zone-icon{font-size:1.4em;margin-bottom:3px}
  .face-zone-name{font-size:0.75em;color:var(--gold);margin-bottom:2px}
  .face-zone-desc{font-size:0.68em;color:var(--muted);line-height:1.3}

  /* Acupoints */
  .acupoint-grid{display:grid;grid-template-columns:1fr 1fr;gap:7px}
  .acupoint{background:#0d0d0d;border:1px solid #2a2a2a;border-radius:9px;padding:9px}
  .acupoint-name{font-size:0.85em;color:var(--gold);font-weight:bold;margin-bottom:2px}
  .acupoint-loc{font-size:0.68em;color:var(--muted);margin-bottom:2px}
  .acupoint-ben{font-size:0.72em;color:var(--text);line-height:1.3}

  .btn-reset{width:100%;padding:9px;margin-top:6px;background:transparent;color:var(--muted);border:1px solid var(--border);border-radius:8px;font-size:0.82em;cursor:pointer;display:none;font-family:inherit}

  .install-section{margin-top:20px;background:var(--card);border:1px solid var(--border);border-radius:14px;padding:16px;text-align:center}
  .install-title{font-size:0.95em;color:var(--gold);margin-bottom:6px;letter-spacing:0.06em}
  .install-desc{font-size:0.72em;color:var(--muted);margin-bottom:10px;line-height:1.5}
  .install-url{display:inline-block;background:#0d0d0d;border:1px solid var(--gold);color:var(--gold);padding:8px 16px;border-radius:8px;font-size:0.78em;word-break:break-all;text-decoration:none;font-family:monospace}
  .install-url:hover{background:#1a1200}

  .disclaimer{margin-top:12px;font-size:0.65em;color:#333;text-align:center;line-height:1.5;padding:8px;border:1px solid #1a1a1a;border-radius:7px}
</style>

<script>
// ===== GLOBALS =====
let currentTab='tongue';
let camOn=false;
let camStream=null;
let uploadedImg={tongue:null,face:null,acupoint:null};
let pickedSymptom='';

// ===== TABS =====
function switchTab(tab){
  currentTab=tab;
  ['tongue','face','acupoint'].forEach(t=>{
    document.getElementById('tabBtn-'+t).classList.toggle('active',t===tab);
    document.getElementById('content-'+t).classList.toggle('active',t===tab);
  });
  stopCam();
  document.getElementById('resultCard').style.display='none';
}

// ===== CAMERA =====
async function openCam(type){
  try{
    stopCam();
    camStream=await navigator.mediaDevices.getUserMedia({video:{facingMode:'user',width:{ideal:1280},height:{ideal:720}}});
    const zone=document.getElementById('zone-'+type);
    document.getElementById('prompt-'+type).style.display='none';
    let v=document.getElementById('camV');
    if(!v){v=document.createElement('video');v.id='camV';v.srcObject=camStream;v.autoplay=true;v.playsInline=true;
      v.style.cssText='max-width:100%;max-height:220px;border-radius:10px;display:block;margin:0 auto;object-fit:cover;';}
    zone.appendChild(v);
    let cb=document.getElementById('capBtn');
    if(!cb){cb=document.createElement('button');cb.id='capBtn';cb.textContent='📸 拍照';
      cb.style.cssText='display:block;width:90%;margin:6px auto 0;padding:9px;background:var(--gold);color:#1a1a0a;border:none;border-radius:8px;font-size:0.88em;font-weight:bold;cursor:pointer;font-family:inherit';
      cb.onclick=()=>captureCam(type);zone.appendChild(cb);}
    document.querySelectorAll('.btn-c,.btn-u').forEach(b=>b.style.display='none');
    document.querySelectorAll('.tab').forEach(t=>t.style.display='none');
    document.getElementById('btn-'+type).style.display='none';
    camOn=true;
  }catch(e){alert('无法访问相机：'+e.message);}
}

function captureCam(type){
  const v=document.getElementById('camV');
  if(!v)return;
  const c=document.createElement('canvas');
  c.width=v.videoWidth;c.height=v.videoHeight;
  c.getContext('2d').drawImage(v,0,0);
  const data=c.toDataURL('image/jpeg',0.9);
  stopCam();
  document.getElementById('img-'+type).src=data;
  document.getElementById('img-'+type).style.display='block';
  document.getElementById('prompt-'+type).style.display='none';
  document.getElementById('btn-'+type).style.display='block';
  uploadedImg[type]=data;
  document.getElementById('resetBtn').style.display='block';
  document.getElementById('resultCard').style.display='none';
  document.querySelectorAll('.tab').forEach(t=>t.style.display='');
  document.querySelectorAll('.btn-c,.btn-u').forEach(b=>b.style.display='');
  camOn=false;
}

function stopCam(){
  if(camStream){camStream.getTracks().forEach(t=>t.stop());camStream=null;}
  const v=document.getElementById('camV');if(v)v.remove();
  const cb=document.getElementById('capBtn');if(cb)cb.remove();
  camOn=false;
}

// ===== FILE HANDLER =====
function handleFile(type,input){
  const file=input.files[0];if(!file)return;
  const reader=new FileReader();
  reader.onload=e=>{
    document.getElementById('img-'+type).src=e.target.result;
    document.getElementById('img-'+type).style.display='block';
    document.getElementById('prompt-'+type).style.display='none';
    document.getElementById('btn-'+type).style.display='block';
    uploadedImg[type]=e.target.result;
    document.getElementById('resetBtn').style.display='block';
    document.getElementById('resultCard').style.display='none';
  };
  reader.readAsDataURL(file);
}

// ===== SYMPTOM PICKER =====
function pickSymptom(el,sym){
  document.querySelectorAll('.tag').forEach(t=>t.classList.remove('active'));
  el.classList.add('active');
  pickedSymptom=sym;
  document.getElementById('btn-acupoint').style.display='block';
  document.getElementById('resultCard').style.display='none';
}

// ===== COLOR ANALYSIS =====
async function getColors(imgData){
  return new Promise(res=>{
    const img=new Image();img.onload=()=>{
      const c=document.createElement('canvas');
      const tw=160;c.width=tw;c.height=Math.round(img.naturalHeight*(tw/img.naturalWidth));
      c.getContext('2d').drawImage(img,0,0,c.width,c.height);
      const d=c.getImageData(0,0,c.width,c.height).data;
      let rS=0,gS=0,bS=0,total=0,white=0,red=0,pink=0,dark=0,yellow=0,pale=0;
      for(let i=0;i<d.length;i+=4){
        const r=d[i],g=d[i+1],b=d[i+2];
        rS+=r;gS+=g;bS+=b;total++;
        if(r>220&&g>220&&b>220)white++;else if(r>170&&g<120&&b<120)red++;
        else if(r>195&&g>125&&b>125)pink++;else if(r<100&&g<100&&b<100)dark++;
        else if(r>175&&g>155&&b<100)yellow++;else if(r>175&&g>175&&b>175)pale++;
      }
      res({avgR:Math.round(rS/total),avgG:Math.round(gS/total),avgB:Math.round(bS/total),
        wp:+(white/total*100).toFixed(1),rp:+(red/total*100).toFixed(1),pk:+(pink/total*100).toFixed(1),
        dp:+(dark/total*100).toFixed(1),yp:+(yellow/total*100).toFixed(1),pp:+(pale/total*100).toFixed(1)});
    };img.src=imgData;
  });
}

// ===== PROGRESS =====
async function progress(steps){
  const wrap=document.getElementById('progress');
  const bar=document.getElementById('progBar');
  const txt=document.getElementById('progText');
  wrap.style.display='block';
  for(const s of steps){txt.textContent=s.t;bar.style.width=s.p+'%';await new Promise(r=>setTimeout(r,450+Math.random()*200));}
  wrap.style.display='none';
}

// ===== DETECT TONGUE =====
function detectConst(ca){
  const rp=+ca.rp,dp=+ca.dp,yp=+ca.yp,wp=+ca.wp,pp=+ca.pp;
  if(dp>4||yp>8){if(rp>5)return CONSTS[5];if(dp>5)return CONSTS[6];return CONSTS[3];}
  if(pp>15&&rp<5)return CONSTS[2];
  if(rp>12){if(yp>3)return CONSTS[5];return CONSTS[3];}
  if(rp>5&&rp<12&&wp>10)return CONSTS[0];
  if(wp>20&&rp<5)return CONSTS[1];
  return CONSTS[0];
}

function analyzeFaceColors(ca){
  const rp=+ca.rp,pp=+ca.pp,yp=+ca.yp;
  let findings=[];
  if(pp>10)findings.push({z:'面色偏白',d:'可能血虚，建议补气血'});
  if(rp>10)findings.push({z:'面色偏红',d:'可能血热或阴虚'});
  if(yp>5)findings.push({z:'面色黄暗',d:'可能湿气重或消化不良'});
  if(ca.dp>3)findings.push({z:'肤色暗沉',d:'可能血瘀或气血不足'});
  if(findings.length===0)findings.push({z:'面色正常',d:'整体气血调和，继续保持'});
  return findings;
}
